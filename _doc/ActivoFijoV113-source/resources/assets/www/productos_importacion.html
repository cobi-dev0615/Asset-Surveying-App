<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="initial-scale=1, width=device-width">

        <!-- MDB CSS -->
        <link rel="stylesheet" href="plugins/fontawesome-free-5.14.0-web/css/all.min.css">
        <!---->
        <link rel="stylesheet" href="plugins/MDBPro4.19.1/css/bootstrap.min.css">
        <link rel="stylesheet" href="plugins/MDBPro4.19.1/css/mdb.lite.min.css">
        <link rel="stylesheet" href="plugins/MDBPro4.19.1/css/style.css">

        <link rel="stylesheet" href="plugins/DataTables/datatables.min.css" />
        <!-- Custom styles for this template -->
        <style></style>
        <title>Importación de productos</title>
    </head>

    <body class="">
        <!--Navbar -->
        <nav class="pl-2 pr-2 py-0 navbar elegant-color-dark lighten-1 text-center fixed-top">
            <ul class="navbar-nav nav-flex-icons">
                <li class="nav-item" id="btnRegresar">
                    <a class="nav-link waves-effect z-depth-0 btn btn-sm btn-floating m-1 p-0">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                </li>
            </ul>
            <span class="navbar-text ml-auto white-text">
                <i class="fas fa-file-import"></i> Importación de catálogo
            </span>
            <ul class="navbar-nav ml-auto nav-flex-icons">
                <li class="nav-item">
                    <a class="nav-link waves-effect z-depth-0 btn btn-sm btn-floating m-1 p-0">
                        &nbsp; &nbsp;
                    </a>
                </li>
            </ul>
        </nav>
        <!--/.Navbar -->
      

        <div class="container-fluid pt-5 pb-5 pl-1 pr-1">
            <div class="text-right w-100">
                <span class="badge lime accent-4">Vista previa del catálogo</span>
            </div>
            <table id="tabla_datos" class="table nowrap table-striped table-bordered table-hover table-sm w-100" cellspacing="0">
                <thead>

                    <tr class="elegant-color-dark lighten-1 text-white">
                        <th>Codigo1</th>
                        <th>Codigo2</th>
                        <th>Codigo3</th>
                        <th>Descripcion</th>
                        <th>UnidadMedida</th>
                        <th>PrecioVenta</th>
                        <th>CantidadTeorica</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <div class="progress progress-striped active">
                <div class="progress-bar teal progress-bar-striped progress-bar-animated w-0" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                </div>
            </div>
            <form class="md-form mt-0 mb-1">


                    <span id="" class="small">&nbsp;&nbsp; Paso 1: Selecciona el catálogo de productos</span>
              

                <div class="file-field">

                    <div class="btn btn-outline-dark waves-effect btn-sm float-left">
                        <span><i class="fas fa-file-excel"></i> Buscar</span>
                        <input type="file" id="txt_archivo" lang="es" accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" onchange="cargaXLSX(event)">
                    </div>
                    <div class="file-path-wrapper">
                        <input class="file-path validate" type="text" placeholder="Buscar archivo Excel" readonly>
                    </div>
                </div>
                <!--
        <div class="file-field">

            <a class="btn-floating btn-cyan  btn-md m-0 float-left">
                <i class="fas fa-file-excel"></i>
                <input type="file" id="txt_archivo" lang="es" accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" onchange="cargaXLSX(event)">
            </a>
            <div class="file-path-wrapper">
                <input class="file-path validate" type="text" placeholder="Buscar catálogo Excel" readonly>
            </div>
        </div>
        -->
                <div>
                    <span class="badge badge-light" id="lbl_total">N° de productos encontrados: 0</span>
                </div>
            </form>

            <div class="form-group pb-5">
                <span id="" class="small">&nbsp;&nbsp; Paso 2: Da clic en "Importar catálogo"</span>
                <button class="btn btn-dark  btn-md btn-block pl-1 pr-1 pt-2 pb-2" id="btn_importar">
                    <i class="fas fa-file-import"></i>  Importar catálogo
                </button>
            </div>

        </div>

        <!--footer-->
        <footer id="footer" class="fixed-bottom border-top shadow-sm mb-1 mt-1 pl-1 pr-1 bg-white" hidden>
            <a href="https://simplestockmobile.com/docs/SSMAndroid/CatalogoPruebaAndroid.xlsx" class="btn btn-md cyan btn-block" id="">
                <i class="fas fa-cloud-download-alt"></i> DESCARGAR PLANTILLA DE EJEMPLO
            </a>
<!--
            <button class="btn btn-md peach-gradient btn-block" id="lbl_tutorial">
                <i class="far fa-hand-point-up"></i> VER EL TUTORIAL DE IMPORTACIÓN
            </button>
        -->
        </footer>

        <!--scripts-->
        <script src="cordova.js"></script>
        <script src="scripts/platformOverrides.js"></script>

        <!--MDB-->
        <script src="plugins/MDBPro4.19.1/js/jquery.min.js"></script>
        <!--<script src="plugins/MDBPro4.19.1/js/popper.min.js"></script>-->
        <script src="plugins/MDBPro4.19.1/js/bootstrap.min.js"></script>
        <script src="plugins/MDBPro4.19.1/js/mdb.lite.min.js"></script>

        <script src="plugins/loadingOverlay/loadingoverlay.min.js"></script>

        <script src="plugins/DataTables/datatables.min.js"></script>
        <script src="plugins/alasql/xlsx.core.min.js"></script>
        <script src="plugins/alasql/alasql.min.js"></script>
        <script>

            var altoTabla = '270px';
            if (screen.height < 600) {
                altoTabla = '150px';
            }

            var tabla = $('#tabla_datos').DataTable({

                ordering: false,
                order: [[0, "desc"]],
                bFilter: false,
                bInfo: false,
                bLengthChange: false,
                paging: false,
                bStateSave: false, // saves sort state using localStorage
                scrollY: altoTabla,
                scrollX: true,
                searching: false,
                autoWidth: true
            });

        </script>
        <script src="plugins/localStorageDB-master/localstoragedb.min.js"></script>
        <!--<script src="scripts/mscripts/sha256.js"></script>-->
        <script src="scripts/mscripts/general.js"></script>
        <script src="scripts/mscripts/bd.js"></script>
        <!--<script src="scripts/mscripts/licencia.js"></script>
    -->
        <script src="scripts/mscripts/productos_importacion.js"></script>


    </body>
</html>
